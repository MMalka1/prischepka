      <stop offset="100%" stop-color="#FF8A1E" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <circle cx="1150" cy="300" r="160" fill="url(#sun)"/>
  <circle cx="1150" cy="300" r="95" fill="#FFE9A8"/>
  <rect y="620" width="1600" height="380" fill="url(#sea)"/>
  <path d="M0,640 Q400,600 800,640 T1600,640 L1600,720 L0,720 Z" fill="#5BD4ED" opacity="0.5"/>
  <ellipse cx="800" cy="1000" rx="1100" ry="200" fill="#FDE9C8" opacity="0.9"/>
  <g filter="url(#grain)"><rect width="1600" height="1000" fill="transparent"/></g>
